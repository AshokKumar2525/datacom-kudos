<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kudos App</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 800px; margin: 2rem auto; }
      nav { margin-bottom: 1rem; }
      .kudos { border: 1px solid #ddd; padding: 0.75rem; margin-bottom: 0.5rem; border-radius:4px }
      .meta { color: #666; font-size: 0.9rem }
      form.inline { display: inline }
    </style>
  </head>
  <body>
    <nav>
      <a href="/">Dashboard</a> |
      <a href="/kudos/new">Give Kudos</a> |
      {% if user %}
        Logged in as <strong>{{ user.name }}</strong> (<a href="/logout">logout</a>)
      {% else %}
        <a href="/login">Login</a>
      {% endif %}
    </nav>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
          {% for m in messages %}
            <li>{{ m }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </body>
</html>
